<!DOCTYPE html>
<html>
<head>
    <title>Minimal Upload Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test-box { 
            border: 2px solid #007bff; 
            padding: 20px; 
            margin: 10px 0; 
            background: #f8f9fa;
        }
        button { 
            padding: 10px 20px; 
            margin: 5px; 
            font-size: 16px;
            cursor: pointer;
        }
        #log { 
            background: #f1f1f1; 
            padding: 10px; 
            margin: 10px 0; 
            font-family: monospace;
            white-space: pre-wrap;
            max-height: 300px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <h1>🔧 Minimal Upload Test</h1>
    <p><strong>This is the simplest possible upload test.</strong></p>

    <div class="test-box">
        <h3>Test 1: Basic File Input</h3>
        <input type="file" id="basicFile" onchange="logFileSelection('basic', this)">
        <button onclick="testBasicUpload()">Test Basic Upload</button>
    </div>

    <div class="test-box">
        <h3>Test 2: Hidden File Input + Button</h3>
        <input type="file" id="hiddenFile" style="display: none;" onchange="logFileSelection('hidden', this)">
        <button onclick="document.getElementById('hiddenFile').click()">Select File</button>
        <button onclick="testHiddenUpload()">Test Hidden Upload</button>
    </div>

    <div class="test-box">
        <h3>Test 3: Form Submission</h3>
        <form id="testForm" action="/upload_guide" method="post" enctype="multipart/form-data">
            <input type="file" name="file" required>
            <button type="submit">Submit Form</button>
        </form>
    </div>

    <div id="log">Ready for testing...
</div>

    <script>
        function log(message) {
            const logDiv = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            logDiv.textContent += `[${timestamp}] ${message}
`;
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(message);
        }

        function logFileSelection(type, input) {
            if (input.files.length > 0) {
                const file = input.files[0];
                log(`✅ ${type} file selected: ${file.name} (${file.size} bytes)`);
            } else {
                log(`❌ No ${type} file selected`);
            }
        }

        function testBasicUpload() {
            const fileInput = document.getElementById('basicFile');
            if (fileInput.files.length === 0) {
                log('❌ No basic file selected');
                return;
            }
            uploadFile(fileInput.files[0], 'basic');
        }

        function testHiddenUpload() {
            const fileInput = document.getElementById('hiddenFile');
            if (fileInput.files.length === 0) {
                log('❌ No hidden file selected');
                return;
            }
            uploadFile(fileInput.files[0], 'hidden');
        }

        function uploadFile(file, type) {
            log(`📤 Starting ${type} upload: ${file.name}`);
            
            const formData = new FormData();
            formData.append('file', file);

            fetch('/upload_guide', {
                method: 'POST',
                body: formData
            })
            .then(response => {
                log(`📋 ${type} upload response: ${response.status} ${response.statusText}`);
                if (response.ok || response.status === 302) {
                    log(`✅ ${type} upload successful!`);
                } else {
                    log(`❌ ${type} upload failed`);
                }
                return response.text();
            })
            .then(data => {
                log(`📄 Response length: ${data.length} characters`);
            })
            .catch(error => {
                log(`❌ ${type} upload error: ${error}`);
            });
        }

        // Form submission handler
        document.getElementById('testForm').addEventListener('submit', function(e) {
            log('📋 Form submission started...');
            // Let the form submit normally
        });

        // Page load
        document.addEventListener('DOMContentLoaded', function() {
            log('🚀 Minimal test page loaded');
            log('📋 Try each test to see which works');
            
            // Test if fetch is available
            if (typeof fetch !== 'undefined') {
                log('✅ Fetch API available');
            } else {
                log('❌ Fetch API not available');
            }
            
            // Test if FormData is available
            if (typeof FormData !== 'undefined') {
                log('✅ FormData API available');
            } else {
                log('❌ FormData API not available');
            }
        });
    </script>
</body>
</html>
